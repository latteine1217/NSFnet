experiment_name: "NSFnet_Re5000_Production"
description: "高精度Physics-Informed Neural Network for Re=5000 Lid-Driven Cavity Flow"

network:
  layers: 6
  layers_1: 4
  hidden_size: 80
  hidden_size_1: 40

training:
  N_f: 120000
  batch_size: null  # 全批次訓練
  checkpoint_freq: 10000       # 檢查點保存頻率
  training_stages:
    - [0.03, 300000, 1e-3, CosineAnnealingLR]   # Stage 1
    - [0.01, 300000, 2e-4, CosineAnnealingLR]   # Stage 2
    - [0.005, 300000, 4e-5, Constant]           # Stage 3
    - [0.002, 300000, 1e-5, CosineAnnealingLR]  # Stage 4
    - [0.0005, 300000, 2e-6, Constant]          # Stage 5
    - [0.0002, 300000, 2e-6, Constant]          # Stage 6

physics:
  Re: 5000
  alpha_evm: 0.03
  beta: 1.0
  bc_weight: 10.0
  eq_weight: 1.0

system:
  device: "auto"
  precision: "float32"
  tensorboard_enabled: true
  log_level: "INFO"
  memory_limit_gb: 14.0
  gradient_clip_norm: 1.0
  memory_cleanup_freq: 100
  epoch_times_limit: 1000
