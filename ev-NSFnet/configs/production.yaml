experiment_name: "NSFnet_Re5000_Production"
description: "高精度Physics-Informed Neural Network for Re=5000 Lid-Driven Cavity Flow"

network:
  layers: 6
  layers_1: 4
  hidden_size: 80
  hidden_size_1: 40
  # 首/末層縮放與EVM激活
  first_layer_scale_main: 2.0
  last_layer_scale_main: 0.5
  first_layer_scale_evm: 1.2
  last_layer_scale_evm: 0.1
  evm_output_activation: softplus_cap

training:
  N_f: 120000
  batch_size: null  # 全批次訓練
  checkpoint_freq: 10000       # 檢查點保存頻率
  log_tips: true               # 啟用訓練提示
  # 採樣排序與PDE距離權重
  sort_by_boundary_distance: false   # 已在loss引入距離權重，預設關閉排序以節省前處理
  pde_distance_weighting: true       # 啟用PDE距離權重 w(d)
  pde_distance_w_min: 0.2            # 權重下限，避免遠區為0
  pde_distance_tau: 0.1              # 距離尺度 (越小越聚焦邊界)
  training_stages:
    - [0.05, 200000, 1e-3, Constant]            # Stage 1
    - [0.04, 100000, 1e-3, CosineAnnealingLR]   # Stage 2
    - [0.03, 200000, 2e-4, CosineAnnealingLR]   # Stage 3
    - [0.01, 200000, 4e-5, CosineAnnealingLR]   # Stage 4
    - [0.005, 200000, 1e-5, CosineAnnealingLR]  # Stage 5
    - [0.0002, 200000, 2e-6, Constant]          # Stage 6
  
  # L-BFGS相關配置
  lbfgs:
    enabled_in_distributed: true      # 啟用分佈式L-BFGS
    # 新觸發條件：分階段視窗+改善率（更穩健）
    trigger_window_per_stage: [5000, 7500, 10000]
    min_improve_pct_per_stage: [0.02, 0.01, 0.005]
    ema_gamma: 0.95
    grad_median_abs_thresh: 0.001
    grad_relative_factor: 0.01
    grad_cos_ema_thresh: 0.9
    cooldown_steps: 5000
    freeze_evm_during_lbfgs: true
    # L-BFGS 段參數（P100 友善）
    max_outer_steps: 200
    timeout_seconds: 600
    max_iter: 25
    history_size: 20
    tolerance_grad: 1e-6
    tolerance_change: 1e-8
    line_search_fn: "strong_wolfe"    # 線搜索方法
    early_stop_patience: 8
    early_stop_min_delta: 1e-4
    checkpoint_before_lbfgs: true     # L-BFGS前自動保存

physics:
  Re: 5000
  alpha_evm: 0.03
  beta: 5.0
  bc_weight: 10.0
  eq_weight: 1.0

supervision:
  enabled: true
  data_points: 1  # 数据监督点数量，0表示不使用监督数据
  data_path: "data/cavity_Re5000_256_Uniform.mat"
  weight: 5.0     # 监督数据权重
  random_seed: 42 # 确保可重现性

system:
  device: "auto"
  precision: "float32"
  tensorboard_enabled: true
  log_level: "INFO"
  memory_limit_gb: 14.0
  gradient_clip_norm: 1.0
  memory_cleanup_freq: 100
  epoch_times_limit: 1000
