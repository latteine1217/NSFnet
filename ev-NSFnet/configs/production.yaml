experiment_name: "NSFnet_Re5000_Production"
description: "高精度Physics-Informed Neural Network for Re=5000 Lid-Driven Cavity Flow"

network:
  layers: 6
  layers_1: 4
  hidden_size: 80
  hidden_size_1: 40

training:
  N_f: 120000
  batch_size: null  # 全批次訓練
  checkpoint_freq: 10000       # 檢查點保存頻率
  training_stages:
    - [0.05, 200000, 1e-3, Constant]            # Stage 1
    - [0.04, 100000, 1e-3, CosineAnnealingLR]   # Stage 2
    - [0.03, 200000, 2e-4, CosineAnnealingLR]   # Stage 3
    - [0.01, 200000, 4e-5, CosineAnnealingLR]   # Stage 4
    - [0.005, 200000, 1e-5, CosineAnnealingLR]  # Stage 5
    - [0.0002, 200000, 2e-6, Constant]          # Stage 6
  
  # L-BFGS相關配置
  lbfgs:
    enabled_in_distributed: true      # 啟用分佈式L-BFGS
    volatility_threshold: 0.01        # 波動度閾值 (1%)
    max_outer_steps: 2000             # 最大外循環步數
    timeout_seconds: 600              # 執行超時 (10分鐘)
    max_iter: 50                      # L-BFGS內部迭代數
    history_size: 20                  # 歷史大小
    tolerance_grad: 1e-8              # 梯度容差
    tolerance_change: 1e-9            # 變化容差
    line_search_fn: "strong_wolfe"    # 線搜索方法
    checkpoint_before_lbfgs: true     # L-BFGS前自動保存

physics:
  Re: 5000
  alpha_evm: 0.03
  beta: 5.0
  bc_weight: 10.0
  eq_weight: 1.0

supervision:
  enabled: true
  data_points: 1  # 数据监督点数量，0表示不使用监督数据
  data_path: "data/cavity_Re5000_256_Uniform.mat"
  weight: 5.0     # 监督数据权重
  random_seed: 42 # 确保可重现性

system:
  device: "auto"
  precision: "float32"
  tensorboard_enabled: true
  log_level: "INFO"
  memory_limit_gb: 14.0
  gradient_clip_norm: 1.0
  memory_cleanup_freq: 100
  epoch_times_limit: 1000
