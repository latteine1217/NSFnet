experiment_name: "NSFnet_Test"
description: "快速測試配置 - 適用於開發和調試"

network:
  layers: 2
  layers_1: 2
  hidden_size: 20
  hidden_size_1: 10

training:
  N_f: 1000
  batch_size: null
  checkpoint_freq: 50
  training_stages:
    - [0.05, 10, 0.001]    # Stage 1: 10 epochs
    - [0.03, 10, 0.0005]   # Stage 2: 10 epochs
  
  # L-BFGS相關配置
  lbfgs:
    enabled_in_distributed: true      # 啟用分佈式L-BFGS
    volatility_threshold: 0.05        # 放寬波動度閾值用於測試
    max_outer_steps: 50               # 減少步數用於測試
    timeout_seconds: 120              # 2分鐘超時
    max_iter: 10                      # 減少內部迭代
    history_size: 5                   # 減少歷史大小
    tolerance_grad: 1e-6              # 放寬梯度容差
    tolerance_change: 1e-7            # 放寬變化容差
    line_search_fn: "strong_wolfe"    # 線搜索方法
    checkpoint_before_lbfgs: true     # L-BFGS前自動保存

physics:
  Re: 3000
  alpha_evm: 0.03
  beta: 1.0
  bc_weight: 20.0
  eq_weight: 1.0

supervision:
  enabled: true
  data_points: 1  # 测试时使用1个数据点
  data_path: "data/cavity_Re5000_256_Uniform.mat"
  weight: 1.0
  random_seed: 42

system:
  device: "auto"
  precision: "float32"
  tensorboard_enabled: true
  log_level: "DEBUG"
  memory_limit_gb: 2.0
  gradient_clip_norm: 1.0
  memory_cleanup_freq: 10
  epoch_times_limit: 100